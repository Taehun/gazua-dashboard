name: intraday snapshot

# KST 평일 08:07~18:07 매시 7분 (프리마켓 ~ 시간외 단일가).
# GitHub cron은 UTC 기준이라 KST 월요일 08시 = UTC 일요일 23시로 요일이 갈라진다.
# 정각(0분)은 혼잡 슬롯이라 7분으로 어긋내 지연을 줄인다.
# 휴장일·시간창은 스크립트가 자체 판정하므로 cron이 다소 지연돼도 안전하다.
on:
  schedule:
    - cron: '7 23 * * 0-4'   # KST 월~금 08:07
    - cron: '7 0-9 * * 1-5'  # KST 월~금 09:07~18:07
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: intraday
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 스냅샷 수집 및 push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          python3 tools/intraday_snapshot.py
