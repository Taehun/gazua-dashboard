# 데모 데이터 생성 전용 전략 — 종목 다양성 확보판 (대시보드 샘플용)
#
# ⚠️ 실운영 strategy.yaml이 아니다. 같은 엔진(run_backtest)을 더 넓은
#    섹터 ETF 유니버스로 돌려, 대시보드 데모에 다양한 종목이 보이게 한다.
#    레짐 임계값·리스크 한도는 실운영 설정과 동일.

mode: paper

universe:
  - { ticker: "069500", name: KODEX 200,            role: long }
  - { ticker: "122630", name: KODEX 레버리지,        role: long_2x,
      max_weight: 0.60, reentry_cooldown_days: 5,
      substitute_on_expiry: "069500" }
  - { ticker: "091160", name: KODEX 반도체,          role: long }
  - { ticker: "305720", name: KODEX 2차전지산업,     role: long }
  - { ticker: "091170", name: KODEX 은행,            role: long }
  - { ticker: "091180", name: KODEX 자동차,          role: long }
  - { ticker: "229200", name: KODEX 코스닥150,       role: long }
  - { ticker: "102780", name: KODEX 삼성그룹,        role: long }
  - { ticker: "132030", name: KODEX 골드선물(H),     role: long }
  - { ticker: "166400", name: TIGER 200커버드콜5%OTM, role: covered_call }
  - { ticker: "114800", name: KODEX 인버스,          role: inverse }
  - { ticker: "252670", name: KODEX 200선물인버스2X,  role: inverse_2x,
      max_weight: 0.25, max_holding_days: 15,
      reentry_cooldown_days: 5, substitute_on_expiry: "114800" }

rebalance:
  band: 0.04                 # 데모: 종목별 비중이 작아 밴드 축소 (실운영 0.08)
  max_daily_turnover: 0.40
  max_daily_turnover_defense: 0.60

signals:
  ma_short: 20
  ma_long: 60
  momentum_months: 6
  trend_weights: { ma: 0.5, momentum: 0.5 }
  vol_window: 20
  vol_percentile_window: 504
  vol_measure: downside
  risk_scale_floor: 0.9
  global_factors:
    enabled: true
  target_vol: 0.18

regimes:
  confirm_days_down: 1
  confirm_days_up: 3
  recovery_fast_entry: { enabled: true, min_drawdown: 0.15, min_rebound: 0.13, confirm_days: 1 }
  panic:   { uncertainty_enter: 0.97, uncertainty_exit: 0.90, exit_confirm_days: 2,
             weights: { CASH: 1.0 } }
  crash:   { trend_enter: -0.60, trend_exit: -0.45,
             weights: { "114800": 0.35, "252670": 0.20, "132030": 0.10, CASH: 0.35 } }
  bear:    { trend_enter: -0.30, trend_exit: -0.15,
             weights: { "114800": 0.35, "132030": 0.15, "091170": 0.05, CASH: 0.45 } }
  bull:    { trend_enter: 0.30, trend_exit: 0.15,
             weights: { "069500": 0.22, "122630": 0.15, "091160": 0.13,
                        "091180": 0.10, "091170": 0.08, "229200": 0.10,
                        "102780": 0.12, CASH: 0.10 } }
  strong_bull: { trend_enter: 0.65, trend_exit: 0.50,
                 weights: { "122630": 0.40, "091160": 0.16, "305720": 0.10,
                            "229200": 0.14, "102780": 0.10, CASH: 0.10 } }
  neutral: { weights: { "069500": 0.12, "166400": 0.28, "132030": 0.10,
                        "091170": 0.08, "114800": 0.07, CASH: 0.35 } }

risk:
  max_position_weight: 0.90
  max_inverse_total: 0.70
  daily_loss_limit_floor: 0.03
  loss_limit_vol_mult: 3.0
  cumulative_loss_days: 5
  cumulative_loss_limit: 0.07
  max_drawdown_halt: 0.10

broker:
  provider: sim

costs:
  commission: 0.00015
  slippage_base: 0.0005
  slippage_turnover_coef: 0.001
  slippage_mult:
    "252670": 2.0
  distribution_yield:
    "069500": 0.015
    "166400": 0.045
